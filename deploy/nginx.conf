# HTTP — serve ACME challenge, redirect everything else to HTTPS
server {
    listen 80;
    server_name chuy.shop www.chuy.shop;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS — main site
server {
    listen 443 ssl http2;
    server_name chuy.shop www.chuy.shop;

    ssl_certificate     /etc/letsencrypt/live/chuy.shop/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/chuy.shop/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    client_max_body_size 20m;

    # API proxy
    location /api/ {
        rewrite ^/api/(.*) /$1 break;
        proxy_pass http://api:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Upload files
    location /uploads/ {
        proxy_pass http://api:3000/uploads/;
    }

    # Admin web
    location / {
        root /usr/share/nginx/html/admin;
        index index.html;
        try_files $uri $uri/ /index.html;
    }
}
