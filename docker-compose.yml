services:
  postgres:
    image: postgres:16-alpine
    container_name: member-platform-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: member_platform
    ports:
      - '5432:5432'
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d member_platform']
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres-data:
